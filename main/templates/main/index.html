<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
</head>
<body>

<h1>{{ title }}</h1>

<p>{{ content }}</p>

<hr>

{% if links %}
    <h3>Сторінки:</h3>
    <ul>
        {% for link in links %}
            <li><a href="{{ link.url }}">{{ link.name }}</a></li>
        {% endfor %}
    </ul>
{% endif %}

</body>
</html>
