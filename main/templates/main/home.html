{% extends 'main/base.html' %}

{% block content %}

    <div class="promo">
        <a href="/" class="promo-button">Реєстрація</a>
        <a class="promo-button" href="{{ file.file.url }}" download>Скачати гру</a>
    </div>
    
    <div class="news-block">
        {% for new in news %}
        <a class="news" href="/">
            <h3>
            {{ new.title }}
            </h3>
        </a>
        {% endfor %}
    </div>

    <div class="subscribe dropdown"> 
            
        <form method="POST">

        {% csrf_token %}
            
            <button type="submit" class="subscribe-btn">Підписатися на розсилку новини</button>

            <div class="dropdown-content subscribe-drop">
                <input type="email" name="email" placeholder="Ваш email" required>
            </div>
            

        </form>
    </div>
    
{% endblock %}
